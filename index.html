<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <!-- MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        body {
            position: fixed;
            inset: 0;
        }

        a-scene,
        canvas,
        .a-canvas {
            position: fixed !important;
            inset: 0;
            width: 100% !important;
            height: 100% !important;
        }

        .mindar-ui-overlay {
            z-index: 10;
        }
    </style>
</head>

<body>

    <div id="start-overlay"
        style="position:fixed;z-index:1000;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);color:#fff;display:flex;align-items:center;justify-content:center;font-size:2em;cursor:pointer;">
        Tap to Start
    </div>

    <a-scene
        mindar-image="imageTargetSrc: targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001; warmupTolerance: 12; missTolerance: 20; uiScanning: yes;"
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: false; antialias: true; alpha: true;"
        loading-screen="enabled: false" debug-ui="enabled: false">

        <a-assets>
            <video id="vid" src="animation.mp4" preload="auto" autoplay loop playsinline webkit-playsinline
                crossorigin="anonymous">
            </video>
        </a-assets>

        <a-camera position="0 0 0"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-plane id="video-plane" material="shader: flat; src: #vid; side: double" width="1" height="0.5625"
                position="0 0 0" rotation="0 0 0">
            </a-plane>
        </a-entity>

    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const scene = document.querySelector("a-scene");
            const video = document.querySelector("#vid");
            const target = document.querySelector("[mindar-image-target]");
            const plane = document.querySelector("#video-plane");
            const overlay = document.getElementById("start-overlay");

            // Error handling for missing elements
            if (!scene || !video || !target || !plane || !overlay) {
                console.error("Critical elements missing from DOM");
                return;
            }

            let playTimeout = null;
            let lastVideoAspect = 16 / 9;
            let targetImageDimensions = null;

            const getTargetImageDimensions = () => {
                try {
                    const mindarSystem = scene.systems['mindar-image-system'];
                    if (!mindarSystem || !mindarSystem.mindar) return null;

                    const mindar = mindarSystem.mindar;
                    if (!mindar.estimator) return null;

                    // Get the actual target image dimensions from MindAR
                    const dimensions = mindar.estimator.targetImageDimensions;
                    if (dimensions && dimensions.width && dimensions.height) {
                        return dimensions;
                    }
                    return null;
                } catch (e) {
                    console.error("Error getting target dimensions:", e);
                    return null;
                }
            };

            const syncPlaneToVideo = () => {
                // Use actual video dimensions for accurate aspect ratio
                if (video.videoWidth && video.videoHeight) {
                    lastVideoAspect = video.videoWidth / video.videoHeight;
                    console.log("Video aspect ratio updated:", lastVideoAspect);
                }
            };

            const syncPlaneToTarget = () => {
                // Get target image dimensions from MindAR
                const dimensions = getTargetImageDimensions();

                if (dimensions) {
                    targetImageDimensions = dimensions;
                    const targetAspect = dimensions.width / dimensions.height;

                    // Scale based on target dimensions
                    // Set a base scale that works well for most devices
                    const baseScale = 1;
                    const scaleX = baseScale;
                    const scaleY = baseScale / targetAspect;

                    plane.setAttribute("width", baseScale.toFixed(4));
                    plane.setAttribute("height", (baseScale / targetAspect).toFixed(4));

                    console.log("Plane synced to target image:", {
                        targetWidth: dimensions.width,
                        targetHeight: dimensions.height,
                        targetAspect: targetAspect,
                        scaleX: scaleX,
                        scaleY: scaleY
                    });
                    return true;
                }
                return false;
            };

            const ensureVideoPlayback = () => {
                video.play().catch((err) => {
                    console.log("Video play blocked:", err);
                });
            };

            video.muted = true;
            video.autoplay = true;
            video.loop = true;
            video.playsInline = true;
            video.setAttribute("playsinline", "");
            video.setAttribute("webkit-playsinline", "");
            video.setAttribute("autoplay", "");

            scene.addEventListener("renderstart", () => {
                console.log("Scene render started");

                // Sync plane to target image dimensions when scene is ready
                setTimeout(() => {
                    syncPlaneToVideo();
                    syncPlaneToTarget();
                }, 100);

                // Unlock audio/video on first tap
                const unlockMedia = () => {
                    video.muted = false;
                    video.play().then(() => video.pause()).catch(() => { });
                    overlay.style.display = "none";
                };
                overlay.addEventListener("click", unlockMedia);
                overlay.addEventListener("touchstart", unlockMedia);
            });

            video.addEventListener("loadedmetadata", () => {
                syncPlaneToVideo();
                console.log("Video metadata loaded", video.videoWidth, video.videoHeight);
            });

            video.addEventListener("loadeddata", () => {
                syncPlaneToVideo();
                console.log("Video loaded");
            });

            video.addEventListener("error", (e) => {
                console.log("Video error:", e);
            });

            target.addEventListener("targetFound", () => {
                console.log("Target found");
                syncPlaneToVideo();
                syncPlaneToTarget(); // Sync to actual target image dimensions
                video.pause();
                video.currentTime = 0;
                if (playTimeout) clearTimeout(playTimeout);
                playTimeout = setTimeout(() => {
                    ensureVideoPlayback();
                }, 2000);
            });

            target.addEventListener("targetLost", () => {
                console.log("Target lost");
                if (playTimeout) clearTimeout(playTimeout);
                video.pause();
                video.currentTime = 0;
            });

            // Continuous responsive updates
            const updatePlaneResponsively = () => {
                // Keep plane responsive to target and video changes
                syncPlaneToVideo();
                syncPlaneToTarget();
                requestAnimationFrame(updatePlaneResponsively);
            };

            // Start responsive updates after scene renders
            scene.addEventListener("renderstart", () => {
                setTimeout(() => {
                    requestAnimationFrame(updatePlaneResponsively);
                }, 100);
            });

        });
    </script>

</body>

</html>
